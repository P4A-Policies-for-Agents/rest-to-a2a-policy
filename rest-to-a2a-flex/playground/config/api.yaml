---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: ingress-http
spec:
  address: http://0.0.0.0:8185
  services:
    upstream:
      # Point at the external A2A agent. The httpbin backend below just echoes,
      # so for real testing replace this with your A2A agent's base address.
      address: "http://backend"
      routes:
        - config:
            destinationPath: /anything
  policies:
    - policyRef:
        name: rest-to-a2a-flex-v1-0
        namespace: default
      config:
        upstreamBinding: jsonrpc
        promptSelector: "#[payload.prompt]"
        continuationMode: none
        responseType: mapping
        mappingConfig:
          responseMapping: "#[payload.artifacts[0].parts[0].text default
            payload.status.message.parts[0].text]"
        a2aConfiguration:
          acceptedOutputModes:
            - text/plain
          blocking: true
        requestErrorStatus: 400
