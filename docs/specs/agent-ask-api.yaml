openapi: 3.0.3
info:
  title: Agent Ask API
  version: 1.0.0
  description: >-
    REST front door for an external A2A v1.0 agent. A single POST /v1/agent/ask
    call carries a free-text question plus a session identifier. The
    rest-to-a2a Omni Gateway policy converts the request into an A2A v1.0
    SendMessage, forwards it to the upstream A2A agent, and shapes the raw A2A
    Task back into AskResponse. Streaming is not supported.
servers:
  - url: /
    description: Omni (Flex) Gateway instance with the rest-to-a2a policy applied.
paths:
  /v1/agent/ask:
    post:
      operationId: askAgent
      summary: Ask the upstream A2A agent a question.
      description: >-
        Sends `prompt` to the upstream A2A agent as an A2A v1.0 SendMessage.
        Optional `sessionId` keys multi-turn continuation: reuse the same value
        across turns to resume an input-required task. The response carries the
        agent's answer text plus the A2A task lifecycle.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: The agent's reply, shaped from the raw A2A task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
        '400':
          description: Missing or invalid prompt (fail-closed; upstream not called).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    AskRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: The free-text prompt forwarded to the A2A agent.
          example: What is the status of SB-IT-884412?
        sessionId:
          type: string
          description: >-
            Optional conversation key for multi-turn continuation. Reuse the
            same value across turns to resume an input-required task. Omit for
            single-shot.
          example: sess-abc-123
    AskResponse:
      type: object
      description: >-
        The agent's reply, shaped from the raw A2A v1.0 task. The answer text
        is lifted from the task's `artifacts[0].parts[0].text` and returned as
        a single `response` field.
      properties:
        response:
          type: string
          description: The agent's reply text.
          example: SB-IT-884412 is online, READY_TO_BREW, descale due in 3 days.
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
              example: missing or invalid prompt
            source:
              type: string
              example: rest-to-a2a
