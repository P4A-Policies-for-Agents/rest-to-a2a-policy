---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: REST to A2A Bridge
    description: >-
      Converts an inbound REST call into an outbound A2A v1.0 SendMessage to an
      external A2A agent. Prompt and conversation identity via DataWeave;
      JSON-RPC 2.0 and HTTP+JSON bindings; multi-turn continuation via cache or
      explicit ids. No streaming (SSE).
    category: Transformation
    metadata/interfaceScope: api,resource
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    upstreamBinding:
      type: string
      title: Upstream A2A Binding
      description: >
        Wire binding used to call the upstream A2A agent. `jsonrpc` posts a
        JSON-RPC 2.0 envelope (method `SendMessage`). `httpjson` posts the bare
        A2A payload to the HTTP+JSON route `POST /message:send`.
      enum:
        - jsonrpc
        - httpjson
      default: jsonrpc
    promptSelector:
      type: string
      title: Prompt Selector (DataWeave)
      description: >
        DataWeave expression returning the prompt string from the inbound REST
        request. Fail-closed: a null/empty/error result rejects the request with
        `requestErrorStatus` and the upstream is not called.
      format: dataweave
      default: "#[payload.prompt]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    continuationMode:
      type: string
      title: Continuation Mode
      description: >
        How multi-turn A2A task continuation is handled. `cache`: the gateway
        derives a cache key from the Conversation Key Selector and
        persists/injects contextId+taskId across turns. `explicit`: the client
        supplies taskId/contextId via the selectors below and nothing is stored.
        `none`: single-shot — no cache, no taskId/contextId carried forward, every
        call is independent.
      enum:
        - cache
        - explicit
        - none
      default: cache
    cacheConfig:
      type: object
      title: Cache Continuation (continuationMode = cache)
      description: >
        Settings used only when `continuationMode=cache`. Ignored in `explicit`
        and `none` modes.
      properties:
        contextKeySelector:
          type: string
          title: Conversation Key Selector (DataWeave)
          description: >
            DataWeave expression returning a conversation-identifying value
            (header/field). It is SHA-256 hashed into the cache key. A null/empty
            result means single-shot (no caching for this call). Example:
            `#[payload.conversationId]`.
          format: dataweave
          bindings:
            payload:
              mimeType: json
            attributes: true
            authentication: false
            vars: []
        distributed:
          type: boolean
          title: Distributed Cache
          description: >
            When true, the conversation cache uses the gossip-replicated remote
            store shared across replicas; when false, a local per-replica store.
          default: false
        conversationTtlSeconds:
          type: integer
          title: Conversation TTL (seconds)
          description: >
            Lifetime of a cached conversation entry and the remote namespace TTL.
          default: 3600
          minimum: 60
          maximum: 86400
    explicitConfig:
      type: object
      title: Explicit Continuation (continuationMode = explicit)
      description: >
        Client-supplied continuation ids, used only when
        `continuationMode=explicit`. Ignored in `cache` and `none` modes. Leave a
        selector empty for a fresh task/context.
      properties:
        taskIdSelector:
          type: string
          title: Task ID Selector (DataWeave)
          description: >
            DataWeave expression returning the A2A `taskId` to continue. Leave
            empty for a fresh task. Example: `#[payload.taskId]`.
          format: dataweave
          bindings:
            payload:
              mimeType: json
            attributes: true
            authentication: false
            vars: []
        contextIdSelector:
          type: string
          title: Context ID Selector (DataWeave)
          description: >
            DataWeave expression returning the A2A `contextId` to continue. Leave
            empty for a fresh context. Example: `#[payload.contextId]`.
          format: dataweave
          bindings:
            payload:
              mimeType: json
            attributes: true
            authentication: false
            vars: []
    a2aConfiguration:
      type: object
      title: A2A SendMessage Configuration
      description: Optional `configuration` block attached to the A2A SendMessage.
      properties:
        acceptedOutputModes:
          type: array
          title: Accepted Output Modes
          description: MIME types the agent may use for output (e.g. text/plain).
          items:
            type: string
        blocking:
          type: boolean
          title: Blocking
          description: Request the agent block until the task reaches a terminal or interrupted state.
          default: true
    metadataSelector:
      type: string
      title: A2A SendMessage Metadata (DataWeave)
      description: >
        Optional. DataWeave expression returning an object of key/value pairs
        attached to the A2A message as `metadata`, e.g.
        `#[{tenant: attributes.headers['x-tenant'], traceId: payload.traceId}]`.
        Each value may itself be any DataWeave expression. A null or non-object
        result attaches no metadata. Leave as `#[null]` (the default) to attach
        none. Example: `#[{tenant: attributes.headers['x-tenant']}]`.
      format: dataweave
      default: "#[null]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    requestErrorStatus:
      type: integer
      title: Request Error Status
      description: HTTP status returned to the caller when prompt extraction fails (fail-closed).
      default: 400
      minimum: 400
      maximum: 599
    responseType:
      type: string
      title: Response Type
      description: >
        How the upstream A2A response is returned to the caller. `raw` (default):
        the raw A2A result is returned unchanged (byte-faithful passthrough).
        `mapping`: shape the response with the Response Mapping DataWeave
        expression. `fields`: build the response from the Response Fields path
        selectors.
      enum:
        - raw
        - mapping
        - fields
      default: raw
    mappingConfig:
      type: object
      title: Response Mapping (responseType = mapping)
      description: >
        Shape the response with a DataWeave expression. Used only when
        `responseType=mapping`; ignored otherwise.
      properties:
        responseMapping:
          type: string
          title: Response Mapping (DataWeave)
          description: >
            DataWeave expression run against the raw A2A result object (the Task or
            Message) to shape the REST response body. On error (or when empty) the
            raw A2A body is passed through unchanged (non-fatal) and a warning is
            logged. Example:
            `#[payload.message.parts[0].text default payload.task.status.update.parts[0].text]`.
          format: dataweave
          bindings:
            payload:
              mimeType: json
            attributes: true
            authentication: false
            vars: []
    fieldsConfig:
      type: object
      title: Response Fields (responseType = fields)
      description: >
        Build the response from dotted-path selectors. Used only when
        `responseType=fields`; ignored otherwise.
      properties:
        responseFields:
          type: array
          title: Response Fields (path selectors)
          description: >
            Build the REST response from dotted-path selections of the raw A2A
            result; the policy assembles the object. Use this to produce a
            flat/custom envelope: the gateway's embedded DataWeave rejects object
            construction inside a single expression, so reshaping is expressed as a
            list of selections here. Each `selector` is a plain JSON path (NOT
            DataWeave) — the gateway does not compile DataWeave nested inside array
            items. An output `name` may be dotted (e.g. `data.taskRef`) to nest.
            Conditionals and computed values are out of scope.
          default: []
          items:
            type: object
            properties:
              name:
                type: string
                title: Output Field Name
                description: Output key; dotted (e.g. `data.taskRef`) builds nested objects.
              selector:
                type: string
                title: Field Path Selector
                description: >
                  Dotted JSON path into the raw A2A result, e.g.
                  `task.status.update.parts[0].text`. Array indices are supported. An
                  optional leading `payload.` is ignored. A path that resolves to
                  nothing yields a null field.
            required:
              - name
              - selector
  required:
    - upstreamBinding
    - promptSelector
    - continuationMode
