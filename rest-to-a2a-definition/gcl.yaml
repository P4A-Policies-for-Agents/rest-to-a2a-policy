---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: REST to A2A Bridge
    description: >-
      Converts an inbound REST call into an outbound A2A v1.0 SendMessage to an
      external A2A agent. Prompt and conversation identity via DataWeave;
      JSON-RPC 2.0 and HTTP+JSON bindings; multi-turn continuation via cache or
      explicit ids. No streaming (SSE).
    category: A2A
    metadata/interfaceScope: api,resource
    metadata/capabilities/assetTypes: http
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    upstreamBinding:
      type: string
      title: Upstream A2A Binding
      description: >
        Wire binding used to call the upstream A2A agent. `jsonrpc` posts a
        JSON-RPC 2.0 envelope (method `SendMessage`). `httpjson` posts the bare
        A2A payload to the HTTP+JSON route `POST /message:send`.
      enum:
        - jsonrpc
        - httpjson
      default: jsonrpc
    promptSelector:
      type: string
      title: Prompt Selector (DataWeave)
      description: >
        DataWeave expression returning the prompt string from the inbound REST
        request. Fail-closed: a null/empty/error result rejects the request with
        `requestErrorStatus` and the upstream is not called.
      format: dataweave
      default: "#[payload.prompt]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    enableTaskContinuation:
      type: boolean
      title: Enable Task Continuation
      description: >
        Master switch for multi-turn A2A task continuation. When true (default)
        the policy preserves conversation continuity per `continuationMode`. When
        false, continuation is disabled entirely: no cache is used, no
        taskId/contextId is carried forward, and every call is single-shot, and
        the continuation settings below (continuationMode and the selectors) are
        ignored.
      default: true
    continuationMode:
      type: string
      title: Continuation Mode
      description: >
        How multi-turn A2A continuation is handled. `cache`: derive a cache key
        from `contextKeySelector`, persist/inject contextId+taskId. `explicit`:
        client supplies taskId/contextId via selectors; nothing is stored.
        `none`: single-shot, no continuation.
      enum:
        - cache
        - explicit
        - none
      default: cache
    contextKeySelector:
      type: string
      title: Conversation Key Selector (DataWeave)
      description: >
        Used only when `continuationMode=cache`. DataWeave expression returning a
        conversation-identifying value (header/field). It is SHA-256 hashed into
        the cache key. A null result means single-shot (no caching for this call).
      format: dataweave
      default: "#[null]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    taskIdSelector:
      type: string
      title: Task ID Selector (DataWeave)
      description: >
        Used only when `continuationMode=explicit`. DataWeave expression
        returning the A2A `taskId` to continue. Null means a fresh task.
      format: dataweave
      default: "#[null]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    contextIdSelector:
      type: string
      title: Context ID Selector (DataWeave)
      description: >
        Used only when `continuationMode=explicit`. DataWeave expression
        returning the A2A `contextId` to continue. Null means a fresh context.
      format: dataweave
      default: "#[null]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    customResponse:
      type: boolean
      title: Custom Response
      description: >
        Master switch for response shaping. When false (default) the raw A2A
        result is returned to the caller unchanged (byte-faithful passthrough).
        When true the response is shaped: if `responseFields` is non-empty it
        takes precedence, otherwise `responseMapping` is applied.
      default: false
    responseMapping:
      type: string
      title: Response Mapping (DataWeave)
      description: >
        Only used when `customResponse` is true and `responseFields` is empty.
        DataWeave expression run against the raw A2A result object (the Task or
        Message) to shape the REST response body. On error the raw A2A body is
        passed through unchanged (non-fatal) and a warning is logged.
      format: dataweave
      default: "#[payload]"
      bindings:
        payload:
          mimeType: json
        attributes: true
        authentication: false
        vars: []
    responseFields:
      type: array
      title: Response Fields (path selectors)
      description: >
        IGNORED unless `customResponse` is true (leave it empty otherwise). Build
        the REST response from dotted-path selections of the raw A2A result; the
        policy
        assembles the object. When non-empty this takes PRECEDENCE over
        `responseMapping`. Use this to produce a flat/custom envelope: the
        gateway's embedded DataWeave rejects object construction inside a single
        expression, so reshaping is expressed as a list of selections here. Each
        `selector` is a plain JSON path (NOT DataWeave) — the gateway does not
        compile DataWeave nested inside array items. An output `name` may be
        dotted (e.g. `data.taskRef`) to nest. Conditionals and computed values
        are out of scope.
      default: []
      items:
        type: object
        properties:
          name:
            type: string
            title: Output Field Name
            description: Output key; dotted (e.g. `data.taskRef`) builds nested objects.
          selector:
            type: string
            title: Field Path Selector
            description: >
              Dotted JSON path into the raw A2A result, e.g.
              `task.status.update.parts[0].text`. Array indices are supported. An
              optional leading `payload.` is ignored. A path that resolves to
              nothing yields a null field.
        required:
          - name
          - selector
    a2aConfiguration:
      type: object
      title: A2A SendMessage Configuration
      description: Optional `configuration` block attached to the A2A SendMessage.
      properties:
        acceptedOutputModes:
          type: array
          title: Accepted Output Modes
          description: MIME types the agent may use for output (e.g. text/plain).
          items:
            type: string
        blocking:
          type: boolean
          title: Blocking
          description: Request the agent block until the task reaches a terminal or interrupted state.
          default: true
    distributed:
      type: boolean
      title: Distributed Cache
      description: >
        Only relevant when `continuationMode=cache`. When true, the conversation
        cache uses the gossip-replicated remote store shared across replicas;
        when false, a local per-replica store is used.
      default: false
    conversationTtlSeconds:
      type: integer
      title: Conversation TTL (seconds)
      description: >
        Lifetime of a cached conversation entry and the remote namespace TTL.
        Only relevant when `continuationMode=cache`.
      default: 3600
      minimum: 60
      maximum: 86400
    requestErrorStatus:
      type: integer
      title: Request Error Status
      description: HTTP status returned to the caller when prompt extraction fails (fail-closed).
      default: 400
      minimum: 400
      maximum: 599
  required:
    - upstreamBinding
    - promptSelector
    - continuationMode
    - contextKeySelector
    - taskIdSelector
    - contextIdSelector
    - responseMapping
